name: pack from deb

on:
  push:
    paths:
      - .github/workflows/deb.yaml
      - deb/*
      - VERSION
  pull_request:
    paths:
      - .github/workflows/deb.yaml
      - deb/*
  workflow_dispatch:

# Third-party actions are pinned to commit SHAs (see build.yaml for rationale).
# Dependabot refreshes these via .github/dependabot.yml.

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  DOCKER_REPO: ghcr.io/illusorykitsune/protonmail-bridge-docker
  DOCKER_REPO_DEV: ghcr.io/illusorykitsune/protonmail-bridge-docker-dev

jobs:
  deb:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set version
        id: version
        run: echo "version=$(cat VERSION)" >> "$GITHUB_ENV"

      - name: Set repo
        id: repo
        run: |
          if [[ "$GITHUB_REF" == "refs/heads/master" ]]; then
            echo "repo=${DOCKER_REPO}" >> "$GITHUB_OUTPUT"
          else
            echo "repo=${DOCKER_REPO_DEV}" >> "$GITHUB_OUTPUT"
          fi

      - name: Docker meta
        id: docker_meta
        uses: docker/metadata-action@369eb591f429131d6889c46b94e711f089e6ca96 # v5.6.1
        with:
          images: ${{ steps.repo.outputs.repo }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@c47758b77c9736f4b2ef4073d4d51994fabfe349 # v3.7.1

      - name: Login to GitHub Container Registry
        uses: docker/login-action@9780b0c442fbb1117ed29e0efdff1e18412f7567 # v3.3.0
        if: ${{ github.event_name != 'pull_request' }}
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Single build: on PRs we just load locally to validate; on push/dispatch
      # we push the image. The GHA buildx cache means a follow-up build on the
      # same commit is effectively free.
      - name: Build image
        uses: docker/build-push-action@4f58ea79222b3b9dc2c8bbdd6debcef730109a75 # v6.9.0
        with:
          context: ./deb
          file: ./deb/Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          load: ${{ github.event_name == 'pull_request' }}
          tags: |
            ${{ steps.repo.outputs.repo }}:latest
            ${{ steps.repo.outputs.repo }}:${{ env.version }}
          labels: ${{ steps.docker_meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
