name: pack from deb

on:
  push:
    paths:
      - .github/workflows/deb.yaml
      - deb/*
      - VERSION
  pull_request:
    paths:
      - .github/workflows/deb.yaml
      - deb/*
  workflow_dispatch:

env:
  DOCKER_REPO: ghcr.io/illusorykitsune/protonmail-bridge-docker
  DOCKER_REPO_DEV: ghcr.io/illusorykitsune/protonmail-bridge-docker-dev

jobs:
  deb:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      security-events: write
    steps:
      - name: Checkout
        uses: actions/checkout@master
      - name: Set version
        id: version
        run: echo "version=`cat VERSION`" >> $GITHUB_ENV
      - name: Set repo
        id: repo
        run: |
          if [[ "$GITHUB_REF" == "refs/heads/master" ]]; then
            echo "repo=${DOCKER_REPO}" >> "$GITHUB_OUTPUT"
          else
            echo "repo=${DOCKER_REPO_DEV}" >> "$GITHUB_OUTPUT"
          fi
      - name: Docker meta
        id: docker_meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.repo.outputs.repo }}
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build image without push
        uses: docker/build-push-action@v6
        with:
          context: ./deb
          file: ./deb/Dockerfile
          load: true
          tags: protonmail-bridge:latest
      - name: Scan image
        id: scan
        uses: anchore/scan-action@v2
        with:
          image: protonmail-bridge:latest
          fail-build: true
          severity-cutoff: critical
          acs-report-enable: true
      - name: Upload Anchore scan SARIF report
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: ${{ steps.scan.outputs.sarif }}
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        if: ${{ github.event_name != 'pull_request' }}
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Push image
        uses: docker/build-push-action@v6
        with:
          context: ./deb
          file: ./deb/Dockerfile
          tags: |
            ${{ steps.repo.outputs.repo }}:latest
            ${{ steps.repo.outputs.repo }}:${{ env.version }}
          labels: ${{ steps.docker_meta.outputs.labels }}
          push: ${{ github.event_name != 'pull_request' }}
